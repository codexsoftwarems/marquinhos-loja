<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marquinhos Motos Parts — Peças e Acessórios</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --preto:#0a0a0a;
  --preto2:#141414;
  --preto3:#1c1c1c;
  --amarelo:#ffd11a;
  --amarelo2:#ffb800;
  --branco:#f5f5f5;
  --cinza:#999;
  --cinza2:#666;
  --borda:#2a2a2a;
  --verde:#25d366;
  --vermelho:#ff4757;
  --card:#161616;
}
body{font-family:'Segoe UI',Roboto,sans-serif;background:var(--preto);color:var(--branco);line-height:1.5}
img{max-width:100%;display:block}
button{font-family:inherit;cursor:pointer;border:none}
a{text-decoration:none;color:inherit}
input,select,textarea{font-family:inherit}
.hidden{display:none!important}

/* SCROLLBAR */
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:var(--preto2)}
::-webkit-scrollbar-thumb{background:var(--amarelo);border-radius:5px}

/* TOPBAR */
.topbar{background:var(--amarelo);color:var(--preto);text-align:center;padding:.5rem;font-size:.82rem;font-weight:600}

/* HEADER */
header{background:var(--preto2);border-bottom:1px solid var(--borda);position:sticky;top:0;z-index:100}
.header-inner{max-width:1280px;margin:0 auto;display:flex;align-items:center;gap:1.5rem;padding:1rem 1.5rem}
.logo{display:flex;align-items:center;gap:.6rem;cursor:pointer;flex-shrink:0}
.logo-mark{width:44px;height:44px;background:var(--preto);border:2px solid var(--amarelo);border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:900;color:var(--amarelo);font-size:1.3rem;font-family:Georgia,serif}
.logo-text{line-height:1.1}
.logo-text .n1{font-weight:800;font-size:1.05rem;letter-spacing:.5px}
.logo-text .n2{font-size:.62rem;color:var(--amarelo);letter-spacing:3px;font-weight:600}
.search-bar{flex:1;max-width:500px;position:relative}
.search-bar input{width:100%;background:var(--preto3);border:1px solid var(--borda);border-radius:24px;color:var(--branco);padding:.7rem 1.2rem;font-size:.9rem}
.search-bar input:focus{outline:none;border-color:var(--amarelo)}
.header-actions{display:flex;align-items:center;gap:.5rem;margin-left:auto}
.icon-btn{background:var(--preto3);border:1px solid var(--borda);border-radius:10px;width:44px;height:44px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;position:relative;transition:all .2s;color:var(--branco)}
.icon-btn:hover{border-color:var(--amarelo);background:var(--preto)}
.badge-count{position:absolute;top:-6px;right:-6px;background:var(--vermelho);color:#fff;font-size:.65rem;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px}
.btn-vendedor{background:var(--amarelo);color:var(--preto);font-weight:700;padding:.6rem 1rem;border-radius:10px;font-size:.82rem;white-space:nowrap;transition:all .2s}
.btn-vendedor:hover{background:var(--amarelo2)}

/* NAV CATEGORIAS */
.nav-cat{background:var(--preto3);border-bottom:1px solid var(--borda)}
.nav-cat-inner{max-width:1280px;margin:0 auto;display:flex;gap:.5rem;padding:.6rem 1.5rem;overflow-x:auto}
.nav-cat-item{background:transparent;color:var(--cinza);padding:.4rem 1rem;border-radius:20px;font-size:.85rem;white-space:nowrap;transition:all .2s;font-weight:500}
.nav-cat-item:hover,.nav-cat-item.active{background:var(--amarelo);color:var(--preto);font-weight:600}

/* PAGE CONTAINER */
.page{max-width:1280px;margin:0 auto;padding:1.5rem;min-height:60vh}

/* HERO */
.hero{position:relative;border-radius:18px;overflow:hidden;margin-bottom:2rem;min-height:340px;background:#0a0a0a;border:1px solid var(--borda);display:flex;align-items:center}
.hero::after{content:'';position:absolute;inset:0;background:url('assets/hero-bg.jpg') center center / cover no-repeat;transition:transform .6s ease,filter .6s ease;pointer-events:none;z-index:0}
.hero::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,rgba(6,6,6,.96) 0%,rgba(6,6,6,.88) 50%,rgba(6,6,6,.55) 78%,rgba(6,6,6,.25) 100%);transition:opacity .6s ease;pointer-events:none;z-index:1}
.hero:hover::after{transform:scale(1.06);animation:heroGlow 2.4s ease-in-out infinite}
.hero:hover::before{opacity:.38}
@keyframes heroGlow{0%,100%{filter:brightness(1)}50%{filter:brightness(1.45)}}
.hero-content{padding:3rem 2rem 3rem 3rem;flex:1;position:relative;z-index:2;max-width:70%}
.hero-badge{display:inline-block;background:rgba(255,209,26,.15);border:1px solid var(--amarelo);color:var(--amarelo);padding:.3rem .9rem;border-radius:20px;font-size:.75rem;font-weight:700;letter-spacing:1px;margin-bottom:1rem}
.hero h1{font-size:2.8rem;font-weight:900;line-height:1.1;margin-bottom:1rem}
.hero h1 span{color:var(--amarelo)}
.hero p{color:var(--cinza);font-size:1.05rem;margin-bottom:1.8rem}
.hero-deco{position:absolute;right:-50px;top:50%;transform:translateY(-50%);font-size:18rem;opacity:.06;z-index:1}
.btn-primary{background:var(--amarelo);color:var(--preto);font-weight:800;padding:.9rem 2rem;border-radius:10px;font-size:1rem;transition:all .25s;display:inline-flex;align-items:center;gap:.5rem}
.btn-primary:hover{background:var(--amarelo2);transform:translateY(-2px)}

/* SECTION TITLE */
.section-head{display:flex;align-items:center;justify-content:space-between;margin:2.5rem 0 1.2rem}
.section-head h2{font-size:1.5rem;font-weight:800}
.section-head h2 span{color:var(--amarelo)}
.see-all{color:var(--amarelo);font-size:.85rem;font-weight:600}

/* CATEGORIAS GRID */
.cat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:1rem}
.cat-card{background:var(--card);border:1px solid var(--borda);border-radius:14px;padding:1rem;text-align:center;cursor:pointer;transition:all .25s;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}
.cat-card:hover{border-color:var(--amarelo);transform:translateY(-3px);background:linear-gradient(135deg,rgba(255,209,26,.08),var(--card))}
.cat-img{width:100%;height:100px;border-radius:10px;overflow:hidden;margin-bottom:.8rem;background:var(--preto3)}
.cat-img img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.cat-card:hover .cat-img img{transform:scale(1.08)}
.cat-card .nm{font-size:1rem;font-weight:700}
.cat-card .ct{font-size:.72rem;color:var(--cinza);margin-top:.2rem}

/* PRODUTOS GRID */
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:1.2rem}
.prod-card{background:var(--card);border:1px solid var(--borda);border-radius:14px;overflow:hidden;transition:all .25s;cursor:pointer;position:relative;display:flex;flex-direction:column}
.prod-card:hover{border-color:var(--amarelo);transform:translateY(-4px);box-shadow:0 12px 30px rgba(0,0,0,.4)}
.prod-img{aspect-ratio:1;background:var(--preto3);position:relative;overflow:hidden}
.prod-img img{width:100%;height:100%;object-fit:cover}
.prod-img .ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:3rem;opacity:.3}
.prod-tag{position:absolute;top:.6rem;left:.6rem;background:var(--amarelo);color:var(--preto);font-size:.68rem;font-weight:800;padding:.2rem .6rem;border-radius:6px;z-index:2}
.prod-tag.novo{background:var(--verde);color:#fff}
.prod-fav{position:absolute;top:.6rem;right:.6rem;background:rgba(0,0,0,.6);border-radius:50%;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:1rem;z-index:2;transition:all .2s;color:#fff}
.prod-fav:hover{background:var(--vermelho)}
.prod-fav.active{background:var(--vermelho)}
.prod-info{padding:1rem;flex:1;display:flex;flex-direction:column}
.prod-cat{font-size:.68rem;color:var(--amarelo);text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-bottom:.3rem}
.prod-nome{font-size:.92rem;font-weight:600;margin-bottom:.5rem;line-height:1.3;flex:1}
.prod-rating{display:flex;align-items:center;gap:.3rem;font-size:.75rem;color:var(--cinza);margin-bottom:.5rem}
.prod-preco{display:flex;align-items:center;gap:.5rem;margin-bottom:.8rem}
.prod-preco .atual{font-size:1.25rem;font-weight:800;color:var(--amarelo)}
.prod-preco .antigo{font-size:.85rem;color:var(--cinza2);text-decoration:line-through}
.prod-add{background:var(--preto3);border:1px solid var(--borda);color:var(--branco);border-radius:8px;padding:.6rem;font-size:.85rem;font-weight:600;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:.4rem}
.prod-add:hover{background:var(--amarelo);color:var(--preto);border-color:var(--amarelo)}
.prod-estoque{font-size:.7rem;color:var(--cinza);margin-bottom:.5rem}
.prod-estoque.baixo{color:var(--amarelo)}
.prod-estoque.zero{color:var(--vermelho)}

/* DEPOIMENTOS */
.depo-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.2rem}
.depo-card{background:var(--card);border:1px solid var(--borda);border-radius:14px;padding:1.5rem}
.depo-stars{color:var(--amarelo);margin-bottom:.7rem}
.depo-text{font-size:.9rem;color:var(--branco);line-height:1.6;margin-bottom:1rem;font-style:italic}
.depo-author{display:flex;align-items:center;gap:.7rem}
.depo-avatar{width:40px;height:40px;border-radius:50%;background:var(--amarelo);color:var(--preto);display:flex;align-items:center;justify-content:center;font-weight:700}
.depo-name{font-weight:600;font-size:.88rem}
.depo-role{font-size:.75rem;color:var(--cinza)}

/* NEWSLETTER */
.newsletter{background:linear-gradient(135deg,var(--amarelo),var(--amarelo2));border-radius:18px;padding:2.5rem;text-align:center;margin:2.5rem 0;color:var(--preto)}
.newsletter h2{font-size:1.8rem;font-weight:900;margin-bottom:.5rem}
.newsletter p{margin-bottom:1.5rem;font-weight:500}
.newsletter-form{display:flex;gap:.6rem;max-width:450px;margin:0 auto}
.newsletter-form input{flex:1;padding:.9rem 1.2rem;border-radius:10px;border:none;font-size:.95rem;background:var(--preto);color:var(--branco)}
.newsletter-form button{background:var(--preto);color:var(--amarelo);font-weight:700;padding:.9rem 1.5rem;border-radius:10px;white-space:nowrap}

/* FOOTER */
footer{background:var(--preto2);border-top:1px solid var(--borda);margin-top:3rem}
.footer-inner{max-width:1280px;margin:0 auto;padding:3rem 1.5rem 1.5rem;display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:2rem}
.footer-col h4{font-size:.95rem;font-weight:700;margin-bottom:1rem;color:var(--amarelo)}
.footer-col p,.footer-col a{font-size:.85rem;color:var(--cinza);display:block;margin-bottom:.6rem;transition:color .2s}
.footer-col a:hover{color:var(--amarelo)}
.footer-bottom{border-top:1px solid var(--borda);padding:1.5rem;text-align:center;font-size:.8rem;color:var(--cinza2)}
.footer-bottom strong{color:var(--amarelo)}

/* WHATSAPP FLOAT */
.wa-float{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--verde);color:#fff;width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.8rem;box-shadow:0 4px 20px rgba(37,211,102,.5);z-index:90;transition:all .3s;animation:wapulse 2.5s infinite}
.wa-float:hover{transform:scale(1.1)}
@keyframes wapulse{0%,100%{box-shadow:0 4px 20px rgba(37,211,102,.5),0 0 0 0 rgba(37,211,102,.4)}50%{box-shadow:0 4px 20px rgba(37,211,102,.5),0 0 0 14px rgba(37,211,102,0)}}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:1000;display:none;align-items:center;justify-content:center;padding:1rem;overflow-y:auto}
.modal-overlay.show{display:flex}
.modal{background:var(--preto2);border:1px solid var(--borda);border-radius:18px;max-width:500px;width:100%;max-height:92vh;overflow-y:auto;position:relative}
.modal-lg{max-width:900px}
.modal-close{position:absolute;top:1rem;right:1rem;background:var(--preto3);border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;z-index:5;color:var(--branco)}
.modal-close:hover{background:var(--vermelho)}
.modal-body{padding:2rem}
.modal-body h2{font-size:1.5rem;font-weight:800;margin-bottom:.3rem}
.modal-body .sub{color:var(--cinza);font-size:.88rem;margin-bottom:1.5rem}

/* FORMS */
.field{margin-bottom:1rem}
.field label{display:block;font-size:.82rem;color:var(--cinza);margin-bottom:.4rem;font-weight:500}
.field input,.field select,.field textarea{width:100%;background:var(--preto3);border:1px solid var(--borda);border-radius:10px;color:var(--branco);padding:.8rem 1rem;font-size:.92rem}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--amarelo)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.btn-full{width:100%;background:var(--amarelo);color:var(--preto);font-weight:800;padding:.95rem;border-radius:10px;font-size:1rem;transition:all .2s}
.btn-full:hover{background:var(--amarelo2)}
.btn-outline-full{width:100%;background:transparent;color:var(--branco);border:1px solid var(--borda);font-weight:600;padding:.95rem;border-radius:10px;font-size:.95rem;transition:all .2s}
.btn-outline-full:hover{border-color:var(--amarelo);color:var(--amarelo)}
.form-toggle{text-align:center;margin-top:1.2rem;font-size:.85rem;color:var(--cinza)}
.form-toggle a{color:var(--amarelo);font-weight:600}

/* PRODUTO DETALHE */
.pd-grid{display:grid;grid-template-columns:1fr 1fr;gap:2rem}
.pd-gallery .pd-main{aspect-ratio:1;background:var(--preto3);border-radius:14px;overflow:hidden;margin-bottom:.8rem}
.pd-main img{width:100%;height:100%;object-fit:cover}
.pd-main .ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:5rem;opacity:.3}
.pd-thumbs{display:flex;gap:.6rem}
.pd-thumb{width:70px;height:70px;border-radius:8px;overflow:hidden;border:2px solid var(--borda);cursor:pointer;background:var(--preto3)}
.pd-thumb.active{border-color:var(--amarelo)}
.pd-thumb img{width:100%;height:100%;object-fit:cover}
.pd-info .pd-cat{color:var(--amarelo);font-size:.78rem;text-transform:uppercase;letter-spacing:1px;font-weight:600}
.pd-info h1{font-size:1.7rem;font-weight:800;margin:.4rem 0 .8rem}
.pd-rating{display:flex;align-items:center;gap:.5rem;margin-bottom:1rem;font-size:.85rem;color:var(--cinza)}
.pd-preco{display:flex;align-items:center;gap:.8rem;margin-bottom:1.5rem}
.pd-preco .atual{font-size:2.2rem;font-weight:900;color:var(--amarelo)}
.pd-preco .antigo{font-size:1.1rem;color:var(--cinza2);text-decoration:line-through}
.pd-desc{color:var(--cinza);font-size:.92rem;line-height:1.7;margin-bottom:1.5rem}
.pd-options{margin-bottom:1.5rem}
.pd-options label{font-size:.82rem;font-weight:600;display:block;margin-bottom:.5rem}
.pd-chips{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem}
.pd-chip{background:var(--preto3);border:1px solid var(--borda);border-radius:8px;padding:.5rem 1rem;font-size:.85rem;cursor:pointer;transition:all .2s;color:var(--branco)}
.pd-chip:hover,.pd-chip.active{background:var(--amarelo);color:var(--preto);border-color:var(--amarelo);font-weight:600}
.pd-qty{display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem}
.qty-control{display:flex;align-items:center;border:1px solid var(--borda);border-radius:10px;overflow:hidden}
.qty-control button{background:var(--preto3);color:var(--branco);width:42px;height:42px;font-size:1.2rem}
.qty-control button:hover{background:var(--amarelo);color:var(--preto)}
.qty-control span{width:50px;text-align:center;font-weight:700}
.pd-actions{display:flex;gap:.8rem}
.pd-size-table{margin-top:1rem;border:1px solid var(--borda);border-radius:10px;overflow:hidden}
.pd-size-table table{width:100%;border-collapse:collapse;font-size:.82rem}
.pd-size-table th{background:var(--preto3);padding:.6rem;text-align:center;color:var(--amarelo)}
.pd-size-table td{padding:.6rem;text-align:center;border-top:1px solid var(--borda)}

/* CARRINHO DRAWER */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:none}
.drawer-overlay.show{display:block}
.drawer{position:fixed;top:0;right:0;width:420px;max-width:90vw;height:100%;background:var(--preto2);border-left:1px solid var(--borda);z-index:1001;transform:translateX(100%);transition:transform .3s;display:flex;flex-direction:column}
.drawer.show{transform:translateX(0)}
.drawer-head{padding:1.5rem;border-bottom:1px solid var(--borda);display:flex;align-items:center;justify-content:space-between}
.drawer-head h3{font-size:1.2rem;font-weight:800}
.drawer-body{flex:1;overflow-y:auto;padding:1rem 1.5rem}
.cart-item{display:flex;gap:1rem;padding:1rem 0;border-bottom:1px solid var(--borda)}
.cart-item-img{width:70px;height:70px;border-radius:10px;background:var(--preto3);flex-shrink:0;overflow:hidden}
.cart-item-img img{width:100%;height:100%;object-fit:cover}
.cart-item-img .ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:1.8rem;opacity:.3}
.cart-item-info{flex:1;min-width:0}
.cart-item-nome{font-size:.88rem;font-weight:600;margin-bottom:.2rem}
.cart-item-var{font-size:.72rem;color:var(--cinza);margin-bottom:.4rem}
.cart-item-preco{color:var(--amarelo);font-weight:700;font-size:.95rem}
.cart-item-actions{display:flex;align-items:center;gap:.5rem;margin-top:.5rem}
.cart-qty{display:flex;align-items:center;border:1px solid var(--borda);border-radius:6px;overflow:hidden}
.cart-qty button{background:var(--preto3);color:var(--branco);width:26px;height:26px;font-size:1rem}
.cart-qty span{width:32px;text-align:center;font-size:.82rem;font-weight:600}
.cart-remove{color:var(--vermelho);font-size:.75rem;background:none;margin-left:auto}
.drawer-foot{padding:1.5rem;border-top:1px solid var(--borda)}
.cart-cupom{display:flex;gap:.5rem;margin-bottom:1rem}
.cart-cupom input{flex:1;background:var(--preto3);border:1px solid var(--borda);border-radius:8px;color:var(--branco);padding:.6rem .8rem;font-size:.85rem}
.cart-cupom button{background:var(--preto3);border:1px solid var(--amarelo);color:var(--amarelo);padding:.6rem 1rem;border-radius:8px;font-weight:600;font-size:.82rem}
.cart-summary{margin-bottom:1rem}
.cart-row{display:flex;justify-content:space-between;font-size:.88rem;margin-bottom:.5rem;color:var(--cinza)}
.cart-row.total{font-size:1.2rem;font-weight:800;color:var(--branco);border-top:1px solid var(--borda);padding-top:.8rem;margin-top:.5rem}
.cart-row.total span:last-child{color:var(--amarelo)}
.cart-row.desconto span:last-child{color:var(--verde)}
.cart-empty{text-align:center;padding:3rem 1rem;color:var(--cinza)}
.cart-empty .ic{font-size:3rem;margin-bottom:1rem;opacity:.4}

/* EMPTY STATE */
.empty-state{text-align:center;padding:4rem 2rem;color:var(--cinza)}
.empty-state .ic{font-size:4rem;margin-bottom:1rem;opacity:.4}
.empty-state h3{font-size:1.3rem;color:var(--branco);margin-bottom:.5rem}

/* TABS (vendedor / conta) */
.tabs{display:flex;gap:.5rem;border-bottom:1px solid var(--borda);margin-bottom:1.5rem;overflow-x:auto}
.tab{background:none;color:var(--cinza);padding:.8rem 1.2rem;font-size:.9rem;font-weight:600;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s}
.tab:hover{color:var(--branco)}
.tab.active{color:var(--amarelo);border-bottom-color:var(--amarelo)}

/* DASHBOARD */
.dash-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-bottom:2rem}
.dash-card{background:var(--card);border:1px solid var(--borda);border-radius:14px;padding:1.5rem}
.dash-card .dc-label{font-size:.8rem;color:var(--cinza);margin-bottom:.5rem}
.dash-card .dc-value{font-size:1.8rem;font-weight:800;color:var(--amarelo)}
.dash-card .dc-sub{font-size:.75rem;color:var(--verde);margin-top:.3rem}

/* TABELA ADMIN */
.admin-table{width:100%;border-collapse:collapse;font-size:.85rem;background:var(--card);border-radius:12px;overflow:hidden}
.admin-table th{background:var(--preto3);padding:.9rem;text-align:left;color:var(--cinza);font-size:.75rem;text-transform:uppercase;letter-spacing:.5px}
.admin-table td{padding:.9rem;border-top:1px solid var(--borda)}
.admin-table tr:hover td{background:rgba(255,209,26,.03)}
.admin-table img{width:44px;height:44px;border-radius:8px;object-fit:cover}
.admin-table .ph{width:44px;height:44px;border-radius:8px;background:var(--preto3);display:flex;align-items:center;justify-content:center;opacity:.4}
.btn-mini{padding:.4rem .8rem;border-radius:6px;font-size:.78rem;font-weight:600;margin-right:.3rem}
.btn-edit{background:var(--preto3);color:var(--amarelo);border:1px solid var(--amarelo)}
.btn-del{background:var(--preto3);color:var(--vermelho);border:1px solid var(--vermelho)}
.btn-add-prod{background:var(--amarelo);color:var(--preto);font-weight:700;padding:.7rem 1.3rem;border-radius:10px;font-size:.88rem;margin-bottom:1.5rem;display:inline-flex;align-items:center;gap:.5rem}

/* TOAST */
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(100px);background:var(--preto3);border:1px solid var(--amarelo);color:var(--branco);padding:1rem 1.5rem;border-radius:12px;font-size:.9rem;font-weight:600;z-index:2000;opacity:0;transition:all .3s;box-shadow:0 8px 30px rgba(0,0,0,.5);display:flex;align-items:center;gap:.6rem}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.success{border-color:var(--verde)}
.toast .ti{font-size:1.2rem}

/* CUPOM BADGE */
.cupom-list{display:flex;flex-direction:column;gap:.8rem}
.cupom-item{background:var(--card);border:1px dashed var(--amarelo);border-radius:12px;padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between}
.cupom-code{font-family:monospace;font-size:1.1rem;font-weight:800;color:var(--amarelo);letter-spacing:1px}
.cupom-desc{font-size:.8rem;color:var(--cinza)}

/* RESPONSIVE */
@media(max-width:900px){
  .hero h1{font-size:2rem}
  .hero-content{padding:2rem 1.5rem;max-width:68%}
}
@media(max-width:600px){
  .hero{min-height:260px}
  .hero-content{text-align:center;padding:2.5rem 1.5rem;max-width:100%}
  .hero::before{background:rgba(5,5,5,.66)}
  .header-inner{flex-wrap:wrap;gap:.8rem}
  .search-bar{order:3;max-width:100%;flex-basis:100%}
  .field-row{grid-template-columns:1fr}
  .footer-inner{grid-template-columns:1fr}
  .logo-text .n1{font-size:.9rem}
  .newsletter-form{flex-direction:column}
}
</style>

async function carregarProdutosNuvem(){
  if(!NUVEM) return;
  try{
    const { data, error } = await sb.from('produtos').select('id,data').order('id');
    if(error) throw error;
    if(Array.isArray(data) && data.length){
      produtos = data.map(r => ({ ...r.data, id: Number(r.id) }));
    }
  }catch(e){ console.warn('[nuvem] erro ao carregar produtos:', e.message||e); }
}
async function restaurarSessaoVendedor(){
  if(!NUVEM) return;
  try{ const { data } = await sb.auth.getSession(); if(data && data.session){ isAdminAtual = await checarAdmin(); vendedorLogado = isAdminAtual; } }catch(e){}
}
async function uploadFotoNuvem(file){
  const ext = ((file.name.split('.').pop()||'jpg').toLowerCase().replace(/[^a-z0-9]/g,'')) || 'jpg';
  const nome = `prod_${Date.now()}_${Math.random().toString(36).slice(2,8)}.${ext}`;
  const { error } = await sb.storage.from(BUCKET_FOTOS).upload(nome, file, { cacheControl:'3600', upsert:false, contentType:file.type||'image/jpeg' });
  if(error) throw error;
  return sb.storage.from(BUCKET_FOTOS).getPublicUrl(nome).data.publicUrl;
}
async function salvarProdutoNuvem(p){
  const { error } = await sb.from('produtos').upsert({ id: p.id, data: p });
  if(error) throw error;
}
async function removerProdutoNuvem(id){
  const { error } = await sb.from('produtos').delete().eq('id', id);
  if(error) throw error;
}
async function sincronizarNuvem(){
  if(!NUVEM){ toast('Nuvem não configurada'); return; }
  if(!vendedorLogado){ toast('Faça login no painel para sincronizar'); return; }
  if(!confirm('Enviar TODOS os produtos atuais para a nuvem? Eles ficarão visíveis em todos os aparelhos.')) return;
  try{
    const { error } = await sb.from('produtos').upsert(produtos.map(p => ({ id: p.id, data: p })));
    if(error) throw error;
    toast('Produtos sincronizados com a nuvem! ☁️', true);
  }catch(e){ toast('Erro ao sincronizar: '+(e.message||'')); console.warn(e); }
}
async function checarAdmin(){
  if(!NUVEM) return false;
  try{
    const { data: u } = await sb.auth.getUser();
    const email = u && u.user ? u.user.email : null;
    if(!email) return false;
    const { data, error } = await sb.from('admins').select('email').eq('email', email).limit(1);
    if(error) throw error;
    return !!(data && data.length);
  }catch(e){ console.warn('[nuvem] checarAdmin:', e.message||e); return false; }
}
async function carregarListaAdmins(){
  const box = document.getElementById('listaAdmins'); if(!box) return;
  try{
    const { data, error } = await sb.from('admins').select('email,criado_em').order('criado_em');
    if(error) throw error;
    box.innerHTML = `<table class="admin-table" style="max-width:520px"><thead><tr><th>E-mail autorizado</th><th>Ações</th></tr></thead><tbody>${(data||[]).map(a=>`<tr><td>${a.email}</td><td><button class="btn-mini btn-del" onclick="removerAdmin('${a.email}')">🗑️</button></td></tr>`).join('')||'<tr><td colspan="2" style="color:var(--cinza)">Nenhum admin cadastrado</td></tr>'}</tbody></table>`;
  }catch(e){ box.innerHTML = '<p style="color:var(--vermelho)">Erro ao carregar lista de admins</p>'; console.warn(e); }
}
async function adicionarAdmin(){
  const el = document.getElementById('novoAdminEmail'); const email = el ? el.value.trim().toLowerCase() : '';
  if(!email || !email.includes('@')){ toast('Digite um e-mail válido'); return; }
  try{
    const { error } = await sb.from('admins').insert({ email });
    if(error) throw error;
    toast('Vendedor autorizado!', true); if(el) el.value=''; carregarListaAdmins();
  }catch(e){ toast('Erro ao autorizar: '+(e.message||'')); console.warn(e); }
}
async function removerAdmin(email){
  if(!confirm('Remover a autorização de '+email+'?')) return;
  try{
    const { error } = await sb.from('admins').delete().eq('email', email);
    if(error) throw error;
    toast('Autorização removida'); carregarListaAdmins();
  }catch(e){ toast('Erro ao remover: '+(e.message||'')); console.warn(e); }
}
function renderAdminAdmins(){
  return `

function money(v){ return 'R$ ' + Number(v).toFixed(2).replace('.', ','); }
function stars(n){ return '★'.repeat(Math.round(n)) + '☆'.repeat(5-Math.round(n)); }
function toast(msg, ok){
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.className = 'toast show' + (ok?' success':'');
  setTimeout(()=> t.className = 'toast', 2500);
}
function cartCount(){ return carrinho.reduce((s,i)=>s+i.qtd,0); }

function renderConteudo(){
  const c = document.getElementById('conteudo');
  if(paginaAtual==='home') c.innerHTML = renderHome();
  else if(paginaAtual==='catalogo') c.innerHTML = renderCatalogo();
  else if(paginaAtual==='produto') c.innerHTML = renderProduto();
  else if(paginaAtual==='favoritos') c.innerHTML = renderFavoritos();
  else if(paginaAtual==='conta') c.innerHTML = renderConta();
  else if(paginaAtual==='vendedor') c.innerHTML = renderVendedor();

}

/* ========== PLACEHOLDER DE IMAGEM (sem foto) ========== */
function placeholderImg(size){
  const iconSize = size==='lg'? '3rem' : (size==='sm'? '1.4rem':'2.2rem');
  const txtSize = size==='lg'? '.9rem' : '.65rem';
  const showTxt = size!=='sm';
  return `<div class="ph-img" style="width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#161616,#0a0a0a);gap:.5rem">
    <div style="font-size:${iconSize};opacity:.5">📷</div>
    ${showTxt?`<div style="font-size:${txtSize};color:#555;font-weight:600;letter-spacing:1px">SEM FOTO</div>`:''}
  </div>`;
}

/* ========== CARD DE PRODUTO ========== */
function cardProduto(p){
  const fav = favoritos.includes(p.id);
  const imgHtml = p.img ? `<img src="${p.img}" alt="${p.nome}">` : placeholderImg();
  const estClass = p.estoque===0?'zero':(p.estoque<=5?'baixo':'');
  const estTxt = p.estoque===0?'Esgotado':(p.estoque<=5?`Últimas ${p.estoque} unidades`:'Em estoque');
  return `
  <div class="prod-card">
    <div class="prod-img" onclick="verProduto(${p.id})">
      ${p.tag?`<span class="prod-tag">${p.tag}</span>`:''}
      ${p.novo&&!p.tag?`<span class="prod-tag novo">NOVO</span>`:''}
      <button class="prod-fav ${fav?'active':''}" onclick="event.stopPropagation();toggleFav(${p.id})">❤️</button>
      ${imgHtml}
    </div>
    <div class="prod-info">
      <div class="prod-cat">${p.cat}</div>
      <div class="prod-nome" onclick="verProduto(${p.id})">${p.nome}</div>
      <div class="prod-rating">${stars(p.rating)} <span>(${p.avaliacoes})</span></div>
      <div class="prod-estoque ${estClass}">${estTxt}</div>
      <div class="prod-preco">
        <span class="atual">${money(p.preco)}</span>
        ${p.precoAntigo?`<span class="antigo">${money(p.precoAntigo)}</span>`:''}
      </div>
      <button class="prod-add" onclick="addCarrinho(${p.id})" ${p.estoque===0?'disabled style="opacity:.4"':''}>
        ${p.estoque===0?'Esgotado':'🛒 Adicionar'}
      </button>
    </div>
  </div>`;
}

function cadastrarNews(){
  const e = document.getElementById('newsEmail').value;
  if(!e || !e.includes('@')){ toast('Digite um e-mail válido'); return; }
  toast('Cadastrado! Use o cupom BEMVINDO10', true);
  document.getElementById('newsEmail').value='';
}

/* ========== CATÁLOGO ========== */
function renderCatalogo(){
  let lista = [...produtos];
  if(filtroCategoria!=='Todos') lista = lista.filter(p=>p.cat===filtroCategoria);
  if(busca){ const b=busca.toLowerCase(); lista = lista.filter(p=>p.nome.toLowerCase().includes(b) || p.cat.toLowerCase().includes(b) || (p.modelos||[]).join(' ').toLowerCase().includes(b)); }
  if(ordenacao==='menor') lista.sort((a,b)=>a.preco-b.preco);
  else if(ordenacao==='maior') lista.sort((a,b)=>b.preco-a.preco);
  else if(ordenacao==='novo') lista.sort((a,b)=>(b.novo?1:0)-(a.novo?1:0));
  else if(ordenacao==='vendido') lista.sort((a,b)=>b.avaliacoes-a.avaliacoes);

  return `
  <div class="page">
    <div class="section-head">
      <h2>${filtroCategoria==='Todos'?'Todos os produtos':filtroCategoria}${busca?` · "${busca}"`:''} <span style="font-size:.9rem;color:var(--cinza);font-weight:400">(${lista.length})</span></h2>
      <select onchange="ordenar(this.value)" style="background:var(--preto3);border:1px solid var(--borda);color:var(--branco);padding:.6rem 1rem;border-radius:10px;font-size:.85rem">
        <option value="destaque" ${ordenacao==='destaque'?'selected':''}>Destaque</option>
        <option value="novo" ${ordenacao==='novo'?'selected':''}>Mais novos</option>
        <option value="vendido" ${ordenacao==='vendido'?'selected':''}>Mais vendidos</option>
        <option value="menor" ${ordenacao==='menor'?'selected':''}>Menor preço</option>
        <option value="maior" ${ordenacao==='maior'?'selected':''}>Maior preço</option>
      </select>
    </div>
    ${lista.length? `<div class="prod-grid">${lista.map(cardProduto).join('')}</div>` :
      `<div class="empty-state"><div class="ic">🔍</div><h3>Nenhum produto encontrado</h3><p>Tente buscar por outro termo ou categoria.</p></div>`}
  </div>`;
}
function ordenar(v){ ordenacao=v; renderConteudo(); }

          💬 <strong style="color:var(--branco)">Dúvidas?</strong> <a href="https://wa.me/${WPP_LOJA}?text=${encodeURIComponent('Olá! Tenho interesse no produto: '+p.nome)}" target="_blank" style="color:var(--verde)">Fale no WhatsApp</a>

/* ========== CARRINHO ========== */
function addCarrinho(id){ const p=produtos.find(x=>x.id===id); addItemCarrinho(p,1,p.cores?p.cores[0]:'',p.modelos?p.modelos[0]:''); }
function addItemCarrinho(p, qtd, cor, modelo){
  if(p.estoque===0){ toast('Produto esgotado'); return; }
  const key = p.id+'|'+cor+'|'+modelo;
  const exist = carrinho.find(i=>i.key===key);
  if(exist){ exist.qtd += qtd; }
  else { carrinho.push({ key, id:p.id, nome:p.nome, preco:p.preco, emoji:p.emoji, img:p.img||null, cor, modelo, qtd }); }
  salvarTudo(); render();
  toast('Adicionado ao carrinho! 🛒', true);
  abrirCarrinho();
}
function abrirCarrinho(){
  let drawer = document.getElementById('cartDrawer');
  if(!drawer){
    const div = document.createElement('div');
    div.innerHTML = `<div class="drawer-overlay" id="cartOverlay" onclick="fecharCarrinho()"></div><div class="drawer" id="cartDrawer"></div>`;
    document.body.appendChild(div);
    drawer = document.getElementById('cartDrawer');
  }
  renderCarrinho();
  setTimeout(()=>{ document.getElementById('cartOverlay').classList.add('show'); document.getElementById('cartDrawer').classList.add('show'); },10);
}
function fecharCarrinho(){
  const o=document.getElementById('cartOverlay'), d=document.getElementById('cartDrawer');
  if(o)o.classList.remove('show'); if(d)d.classList.remove('show');
}
function renderCarrinho(){
  const d = document.getElementById('cartDrawer');
  if(!carrinho.length){
    d.innerHTML = `
      <div class="drawer-head"><h3>🛒 Carrinho</h3><button class="modal-close" onclick="fecharCarrinho()">✕</button></div>
      <div class="cart-empty"><div class="ic">🛒</div><p>Seu carrinho está vazio</p><br><button class="btn-primary" onclick="fecharCarrinho();irPara('catalogo')">Ver produtos</button></div>`;
    return;
  }
  const subtotal = carrinho.reduce((s,i)=>s+i.preco*i.qtd,0);
  let desconto = 0;
  if(cupomAplicado){ desconto = subtotal * (cupomAplicado.desc/100); }
  const total = subtotal - desconto;
  d.innerHTML = `
    <div class="drawer-head"><h3>🛒 Carrinho (${cartCount()})</h3><button class="modal-close" onclick="fecharCarrinho()">✕</button></div>
    <div class="drawer-body">
      ${carrinho.map(i=>`
        <div class="cart-item">
          <div class="cart-item-img">${i.img?`<img src="${i.img}">`:placeholderImg('sm')}</div>
          <div class="cart-item-info">
            <div class="cart-item-nome">${i.nome}</div>
            <div class="cart-item-var">${[i.modelo,i.cor].filter(Boolean).join(' · ')}</div>
            <div class="cart-item-preco">${money(i.preco)}</div>
            <div class="cart-item-actions">
              <div class="cart-qty">
                <button onclick="mudarItemQtd('${i.key}',-1)">−</button>
                <span>${i.qtd}</span>
                <button onclick="mudarItemQtd('${i.key}',1)">+</button>
              </div>
              <button class="cart-remove" onclick="removerItem('${i.key}')">🗑️ Remover</button>
            </div>
          </div>
        </div>
      `).join('')}
    </div>
    <div class="drawer-foot">
      <div class="cart-cupom">
        <input type="text" id="cupomInput" placeholder="Cupom de desconto" value="${cupomAplicado?cupomAplicado.code:''}">
        <button onclick="aplicarCupom()">Aplicar</button>
      </div>
      <div class="cart-summary">
        <div class="cart-row"><span>Subtotal</span><span>${money(subtotal)}</span></div>
        ${desconto>0?`<div class="cart-row desconto"><span>Desconto (${cupomAplicado.desc}%)</span><span>− ${money(desconto)}</span></div>`:''}
        <div class="cart-row"><span>Frete</span><span style="color:var(--cinza)">Calculado no checkout</span></div>
        <div class="cart-row total"><span>Total</span><span>${money(total)}</span></div>
      </div>
      <button class="btn-full" onclick="fecharCarrinho();irPara('checkout')">Finalizar compra →</button>
    </div>`;
}
function mudarItemQtd(key,d){
  const it=carrinho.find(i=>i.key===key);
  if(it){ it.qtd+=d; if(it.qtd<=0) carrinho=carrinho.filter(i=>i.key!==key); }
  salvarTudo(); renderCarrinho(); render();
  if(document.getElementById('cartDrawer')) abrirCarrinho();
}
function removerItem(key){ carrinho=carrinho.filter(i=>i.key!==key); salvarTudo(); renderCarrinho(); render(); abrirCarrinho(); toast('Item removido'); }
function aplicarCupom(){
  const code = document.getElementById('cupomInput').value.trim().toUpperCase();
  if(!code){ cupomAplicado=null; renderCarrinho(); return; }
  const cup = cupons.find(c=>c.code===code && c.ativo);
  if(cup){ cupomAplicado=cup; toast(`Cupom aplicado! ${cup.desc}% de desconto 🎉`, true); }
  else { cupomAplicado=null; toast('Cupom inválido ou expirado'); }
  renderCarrinho();
}

let freteAtual = 10;
function calcularFrete(){
  const km = parseFloat(document.getElementById('ckKm')?.value || 5);
  freteAtual = km * 2; // R$ 2 por km
  const subtotal = carrinho.reduce((s,i)=>s+i.preco*i.qtd,0);
  const desconto = cupomAplicado? subtotal*(cupomAplicado.desc/100):0;
  document.getElementById('freteVal').textContent = money(freteAtual);
  document.getElementById('freteKm').textContent = `(${km}km × R$2)`;
  document.getElementById('totalFinal').textContent = money(subtotal-desconto+freteAtual);
}
function selPgto(el){ el.parentElement.querySelectorAll('.pd-chip').forEach(c=>c.classList.remove('active')); el.classList.add('active'); }
function finalizarPedido(){
  const nome = document.getElementById('ckNome')?.value;
  const end = document.getElementById('ckEnd')?.value;
  const tel = document.getElementById('ckTel')?.value;
  if(!nome||!end||!tel){ toast('Preencha todos os dados de entrega'); return; }
  const subtotal = carrinho.reduce((s,i)=>s+i.preco*i.qtd,0);
  const desconto = cupomAplicado? subtotal*(cupomAplicado.desc/100):0;
  const total = subtotal-desconto+freteAtual;
  const pgto = document.querySelector('.pd-chip.active')?.textContent || 'Dinheiro';
  // salva pedido
  const pedido = { id:Date.now(), data:new Date().toLocaleString('pt-BR'), cliente:nome, itens:[...carrinho], subtotal, desconto, frete:freteAtual, total, status:'Novo', pgto };
  pedidos.unshift(pedido); salvarTudo();
  // monta mensagem WhatsApp
  let msg = `*NOVO PEDIDO - Marquinhos Motos Parts*\n\n`;
  msg += `*Cliente:* ${nome}\n*Telefone:* ${tel}\n*Endereço:* ${end}\n\n*ITENS:*\n`;
  carrinho.forEach(i=>{ msg += `• ${i.qtd}x ${i.nome}${i.cor?' ('+i.cor+')':''} - ${money(i.preco*i.qtd)}\n`; });
  msg += `\n*Subtotal:* ${money(subtotal)}\n`;
  if(desconto>0) msg += `*Desconto:* -${money(desconto)}\n`;
  msg += `*Frete:* ${money(freteAtual)}\n*TOTAL:* ${money(total)}\n*Pagamento:* ${pgto}`;
  // limpa carrinho
  carrinho=[]; cupomAplicado=null; salvarTudo();
  window.open(`https://wa.me/${WPP_LOJA}?text=${encodeURIComponent(msg)}`, '_blank');
  toast('Pedido enviado! 🎉', true);
  setTimeout(()=>irPara('home'), 1000);
}

function fazerLogin(){
  const email=document.getElementById('logEmail').value;
  const senha=document.getElementById('logSenha').value;
  if(!email||!senha){ toast('Preencha e-mail e senha'); return; }
  const contas = DB.get('contas', {});
  if(contas[email] && contas[email].senha===senha){
    usuario = { nome:contas[email].nome, email, tel:contas[email].tel };
    DB.set('usuario', usuario);
    fecharModal(); render(); toast('Bem-vindo de volta, '+usuario.nome.split(' ')[0]+'! 👋', true);

  } else { toast('E-mail ou senha incorretos'); }

function fazerCadastro(){
  const nome=document.getElementById('logNome').value;
  const email=document.getElementById('logEmail').value;
  const senha=document.getElementById('logSenha').value;
  const tel=document.getElementById('logTel').value;
  if(!nome||!email||!senha){ toast('Preencha todos os campos'); return; }
  const contas = DB.get('contas', {});
  if(contas[email]){ toast('E-mail já cadastrado'); return; }
  contas[email] = { nome, senha, tel };
  DB.set('contas', contas);
  usuario = { nome, email, tel };
  DB.set('usuario', usuario);
  fecharModal(); render(); toast('Conta criada com sucesso! 🎉', true);
  if(paginaAtual==='checkout') renderConteudo();
}

  if(NUVEM){
    const email = (document.getElementById('vendEmail')||{}).value;

    try{
      const { error } = await sb.auth.signInWithPassword({ email:email.trim(), password:s });
      if(error) throw error;
      isAdminAtual = await checarAdmin();
      if(!isAdminAtual){ await sb.auth.signOut(); toast('Sua conta não tem permissão de administrador. Peça autorização ao dono da loja.'); return; }
      vendedorLogado=true; fecharModal(); irPara('vendedor'); toast('Bem-vindo ao painel! 🔧', true);
    }catch(e){ toast('E-mail ou senha incorretos'); console.warn(e); }

  }
  const s = document.getElementById('vendSenha').value;
  if(s===SENHA_VENDEDOR){ vendedorLogado=true; fecharModal(); irPara('vendedor'); toast('Bem-vindo ao painel! 🔧', true); }
  else toast('Senha incorreta');
}
async function cadastrarVendedor(){
  const email=(document.getElementById('vendEmail')||{}).value;
  const s=document.getElementById('vendSenha').value;
  if(!email||!s){ toast('Preencha e-mail e senha'); return; }
  if(s.length<6){ toast('A senha precisa ter pelo menos 6 caracteres'); return; }
  try{
    const { data, error } = await sb.auth.signUp({ email:email.trim(), password:s });
    if(error) throw error;
    if(data && data.session){
      isAdminAtual = await checarAdmin();
      if(!isAdminAtual){ await sb.auth.signOut(); vendedorLogado=false; toast('Conta criada! Aguarde o dono da loja autorizar seu acesso de administrador.'); vendMode='login'; abrirLoginVendedor(); return; }
      vendedorLogado=true; fecharModal(); irPara('vendedor'); toast('Conta criada! Bem-vindo 🔧', true);
    } else {
      toast('Conta criada! Confirme pelo e-mail e depois faça login.');
      vendMode='login'; abrirLoginVendedor();
    }
  }catch(e){ toast('Erro ao cadastrar: '+(e.message||'')); console.warn(e); }
}
async function sairVendedor(){
  vendedorLogado=false;
  if(NUVEM){ try{ await sb.auth.signOut(); }catch(e){} }
  irPara('home');
}

/* ========== PAINEL VENDEDOR ========== */
let vendTab='dashboard';
function renderVendedor(){
  if(!vendedorLogado){ return `<div class="page"><div class="empty-state"><div class="ic">🔐</div><h3>Acesso restrito</h3><button class="btn-primary" onclick="abrirLoginVendedor()">Fazer login</button></div></div>`; }
  return `
  <div class="page">
    <div class="section-head"><h2>🔧 Painel do <span>Vendedor</span></h2><button class="btn-outline-full" style="width:auto;padding:.6rem 1.2rem" onclick="sairVendedor()">Sair</button></div>
    <div class="tabs">
      <button class="tab ${vendTab==='dashboard'?'active':''}" onclick="vendTab='dashboard';renderConteudo()">📊 Dashboard</button>
      <button class="tab ${vendTab==='produtos'?'active':''}" onclick="vendTab='produtos';renderConteudo()">📦 Produtos</button>
      <button class="tab ${vendTab==='cupons'?'active':''}" onclick="vendTab='cupons';renderConteudo()">🎟️ Cupons</button>
      <button class="tab ${vendTab==='pedidos'?'active':''}" onclick="vendTab='pedidos';renderConteudo()">🛒 Pedidos (${pedidos.length})</button>
      ${NUVEM?`<button class="tab ${vendTab==='vendedores'?'active':''}" onclick="vendTab='vendedores';renderConteudo();carregarListaAdmins()">👤 Vendedores</button>`:''}
    </div>
    ${vendTab==='dashboard'?renderDashboard():''}
    ${vendTab==='produtos'?renderAdminProdutos():''}
    ${vendTab==='cupons'?renderAdminCupons():''}
    ${vendTab==='pedidos'?renderAdminPedidos():''}
    ${vendTab==='vendedores'?renderAdminAdmins():''}
  </div>`;
}

function renderDashboard(){
  const totalVendas = pedidos.reduce((s,p)=>s+p.total,0);
  const ticketMedio = pedidos.length? totalVendas/pedidos.length : 0;
  const totalProdutos = produtos.length;
  const estoqueBaixo = produtos.filter(p=>p.estoque<=5).length;
  // top produtos por vendas
  const vendasPorProd = {};
  pedidos.forEach(p=>p.itens.forEach(i=>{ vendasPorProd[i.nome]=(vendasPorProd[i.nome]||0)+i.qtd; }));
  const topProds = Object.entries(vendasPorProd).sort((a,b)=>b[1]-a[1]).slice(0,5);
  return `
    <div class="dash-cards">
      <div class="dash-card"><div class="dc-label">💰 Total em vendas</div><div class="dc-value">${money(totalVendas)}</div><div class="dc-sub">${pedidos.length} pedidos</div></div>
      <div class="dash-card"><div class="dc-label">🎫 Ticket médio</div><div class="dc-value">${money(ticketMedio)}</div></div>
      <div class="dash-card"><div class="dc-label">📦 Produtos cadastrados</div><div class="dc-value">${totalProdutos}</div></div>
      <div class="dash-card"><div class="dc-label">⚠️ Estoque baixo</div><div class="dc-value" style="color:${estoqueBaixo?'var(--vermelho)':'var(--amarelo)'}">${estoqueBaixo}</div><div class="dc-sub" style="color:var(--cinza)">produtos com ≤5 un.</div></div>
    </div>
    <div class="section-head"><h2>🏆 Produtos mais vendidos</h2></div>
    ${topProds.length? `<table class="admin-table"><thead><tr><th>Produto</th><th>Vendas</th></tr></thead><tbody>
      ${topProds.map(([nome,qtd])=>`<tr><td>${nome}</td><td><strong style="color:var(--amarelo)">${qtd} un.</strong></td></tr>`).join('')}
    </tbody></table>` : `<div class="empty-state" style="padding:2rem"><p>Ainda não há vendas registradas. Os dados aparecerão aqui conforme os pedidos chegarem.</p></div>`}
  `;
}

function renderAdminProdutos(){
  return `
    <button class="btn-add-prod" onclick="abrirEditarProduto()">➕ Adicionar produto</button>
    ${NUVEM?`<button class="btn-add-prod" style="background:var(--preto3);color:var(--branco);margin-left:.5rem" onclick="sincronizarNuvem()">☁️ Sincronizar com a nuvem</button>`:''}
    <table class="admin-table">
      <thead><tr><th>Foto</th><th>Produto</th><th>Categoria</th><th>Preço</th><th>Estoque</th><th>Ações</th></tr></thead>
      <tbody>
        ${produtos.map(p=>`
          <tr>
            <td>${p.img?`<img src="${p.img}">`:`<div class="ph">📷</div>`}</td>
            <td>${p.nome}</td>
            <td>${p.cat}</td>
            <td><strong style="color:var(--amarelo)">${money(p.preco)}</strong></td>
            <td><span style="color:${p.estoque===0?'var(--vermelho)':p.estoque<=5?'var(--amarelo)':'var(--branco)'}">${p.estoque} un.</span></td>
            <td>
              <button class="btn-mini btn-edit" onclick="abrirEditarProduto(${p.id})">✏️ Editar</button>
              <button class="btn-mini btn-del" onclick="removerProduto(${p.id})">🗑️</button>
            </td>
          </tr>
        `).join('')}
      </tbody>
    </table>`;
}

function abrirEditarProduto(id){
  const p = id? produtos.find(x=>x.id===id) : { id:0, nome:'', cat:'Acessórios', preco:'', precoAntigo:'', emoji:'📦', tag:'', novo:false, estoque:'', rating:5, avaliacoes:0, modelos:[], cores:[], desc:'', img:null };
  abrirModal(`
    <button class="modal-close" onclick="fecharModal()">✕</button>
    <div class="modal-body" style="max-height:85vh;overflow-y:auto">
      <h2>${id?'Editar':'Adicionar'} produto</h2>
      <p class="sub">Preencha as informações do produto</p>
      <div class="field"><label>Nome do produto</label><input type="text" id="epNome" value="${p.nome}"></div>
      <div class="field-row">
        <div class="field"><label>Categoria</label><select id="epCat">${CATEGORIAS.map(c=>`<option ${p.cat===c.nome?'selected':''}>${c.nome}</option>`).join('')}</select></div>
        <div class="field"><label>Emoji/Ícone</label><input type="text" id="epEmoji" value="${p.emoji}" maxlength="2"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Preço (R$)</label><input type="number" id="epPreco" value="${p.preco}" step="0.01"></div>
        <div class="field"><label>Preço antigo (opcional)</label><input type="number" id="epPrecoAnt" value="${p.precoAntigo||''}" step="0.01"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Estoque</label><input type="number" id="epEstoque" value="${p.estoque}"></div>
        <div class="field"><label>Etiqueta</label><select id="epTag"><option value="" ${!p.tag?'selected':''}>Nenhuma</option><option ${p.tag==='OFERTA'?'selected':''}>OFERTA</option></select></div>
      </div>
      <div class="field"><label><input type="checkbox" id="epNovo" ${p.novo?'checked':''} style="width:auto;margin-right:.5rem">Marcar como NOVO</label></div>
      <div class="field"><label>Foto do produto (URL ou deixe vazio p/ emoji)</label><input type="text" id="epImg" value="${p.img||''}" placeholder="https://..."></div>
      <div class="field"><label>Imagem do dispositivo (opcional)</label><input type="file" accept="image/*" onchange="uploadFoto(this)" id="epFile"><div id="epPreview" style="margin-top:.5rem">${p.img?`<img src="${p.img}" style="max-height:80px;border-radius:8px">`:''}</div></div>
      <div class="field"><label>Modelos compatíveis (separe por vírgula)</label><input type="text" id="epModelos" value="${(p.modelos||[]).join(', ')}" placeholder="CG 160, Titan 150"></div>
      <div class="field"><label>Cores disponíveis (separe por vírgula)</label><input type="text" id="epCores" value="${(p.cores||[]).join(', ')}" placeholder="Preto, Cromado"></div>
      <div class="field"><label>Descrição</label><textarea id="epDesc" rows="3">${p.desc}</textarea></div>
      <button class="btn-full" onclick="salvarProduto(${id||0})">💾 Salvar produto</button>
    </div>`);
}
let fotoTemp = null;
async function uploadFoto(input){
  const file = input.files[0];
  if(!file) return;
  const prev = document.getElementById('epPreview');
  if(NUVEM){
    if(prev) prev.innerHTML = '<span style="font-size:.8rem;color:var(--cinza)">Enviando foto para a nuvem...</span>';
    try{
      fotoTemp = await uploadFotoNuvem(file);
      if(prev) prev.innerHTML = `<img src="${fotoTemp}" style="max-height:80px;border-radius:8px">`;
      return;
    }catch(e){ toast('Falha ao enviar foto: '+(e.message||'')); console.warn(e); if(prev) prev.innerHTML=''; }
  }
  const reader = new FileReader();
  reader.onload = e=>{ fotoTemp = e.target.result; if(prev) prev.innerHTML = `<img src="${fotoTemp}" style="max-height:80px;border-radius:8px">`; };
  reader.readAsDataURL(file);
}
async function salvarProduto(id){
  const nome = document.getElementById('epNome').value;
  const preco = parseFloat(document.getElementById('epPreco').value);
  const estoque = parseInt(document.getElementById('epEstoque').value);
  if(!nome||isNaN(preco)){ toast('Preencha nome e preço'); return; }
  const imgUrl = document.getElementById('epImg').value || fotoTemp || null;
  const dados = {
    nome, cat:document.getElementById('epCat').value,
    emoji:document.getElementById('epEmoji').value||'📦',
    preco, precoAntigo:parseFloat(document.getElementById('epPrecoAnt').value)||0,
    estoque:estoque||0, tag:document.getElementById('epTag').value,
    novo:document.getElementById('epNovo').checked,
    img:imgUrl,
    modelos:document.getElementById('epModelos').value.split(',').map(s=>s.trim()).filter(Boolean),
    cores:document.getElementById('epCores').value.split(',').map(s=>s.trim()).filter(Boolean),
    desc:document.getElementById('epDesc').value,
  };
  let alvo;
  if(id){ const p=produtos.find(x=>x.id===id); Object.assign(p,dados); alvo=p; }
  else { dados.id=Date.now(); dados.rating=5; dados.avaliacoes=0; produtos.push(dados); alvo=dados; }
  fotoTemp=null; salvarTudo();
  if(NUVEM){
    try{ await salvarProdutoNuvem(alvo); }
    catch(e){ toast('Erro ao salvar na nuvem: '+(e.message||'')); console.warn(e); fecharModal(); renderConteudo(); return; }
  }
  toast(id?'Produto atualizado!':'Produto adicionado!', true);
  fecharModal(); renderConteudo();
}
async function removerProduto(id){
  if(!confirm('Remover este produto?')) return;
  produtos = produtos.filter(p=>p.id!==id); salvarTudo();
  if(NUVEM){ try{ await removerProdutoNuvem(id); }catch(e){ toast('Erro ao remover na nuvem: '+(e.message||'')); console.warn(e); } }
  renderConteudo(); toast('Produto removido');
}

function renderAdminCupons(){
  return `
    <button class="btn-add-prod" onclick="abrirEditarCupom()">➕ Criar cupom</button>
    <div class="cupom-list">
      ${cupons.map((c,i)=>`
        <div class="cupom-item">
          <div>
            <div class="cupom-code">🎟️ ${c.code}</div>
            <div class="cupom-desc">${c.desc}% de desconto · ${c.ativo?'<span style="color:var(--verde)">Ativo</span>':'<span style="color:var(--vermelho)">Inativo</span>'}</div>
          </div>
          <div>
            <button class="btn-mini btn-edit" onclick="toggleCupom(${i})">${c.ativo?'Desativar':'Ativar'}</button>
            <button class="btn-mini btn-del" onclick="removerCupom(${i})">🗑️</button>
          </div>
        </div>
      `).join('')}
    </div>`;
}
function abrirEditarCupom(){
  abrirModal(`
    <button class="modal-close" onclick="fecharModal()">✕</button>
    <div class="modal-body">
      <h2>🎟️ Criar cupom</h2>
      <p class="sub">O desconto será aplicado automaticamente no carrinho do cliente</p>
      <div class="field"><label>Código do cupom</label><input type="text" id="cpCode" placeholder="Ex: PROMO15" style="text-transform:uppercase"></div>
      <div class="field"><label>Desconto (%)</label><input type="number" id="cpDesc" min="0" max="100" placeholder="0 a 100"></div>
      <button class="btn-full" onclick="salvarCupom()">Criar cupom</button>
    </div>`);
}
function salvarCupom(){
  const code = document.getElementById('cpCode').value.trim().toUpperCase();
  const desc = parseInt(document.getElementById('cpDesc').value);
  if(!code || isNaN(desc) || desc<0 || desc>100){ toast('Preencha código e desconto (0-100%)'); return; }
  if(cupons.find(c=>c.code===code)){ toast('Cupom já existe'); return; }
  cupons.push({ code, desc, ativo:true }); salvarTudo(); fecharModal(); renderConteudo(); toast('Cupom criado!', true);
}
function toggleCupom(i){ cupons[i].ativo=!cupons[i].ativo; salvarTudo(); renderConteudo(); }
function removerCupom(i){ if(!confirm('Remover cupom?'))return; cupons.splice(i,1); salvarTudo(); renderConteudo(); toast('Cupom removido'); }

function renderAdminPedidos(){
  return `
    ${pedidos.length? `<table class="admin-table">
      <thead><tr><th>Pedido</th><th>Data</th><th>Cliente</th><th>Itens</th><th>Total</th><th>Status</th></tr></thead>
      <tbody>
        ${pedidos.map(p=>`
          <tr>
            <td>#${p.id.toString().slice(-6)}</td>
            <td style="font-size:.78rem">${p.data}</td>
            <td>${p.cliente}</td>
            <td>${p.itens.reduce((s,i)=>s+i.qtd,0)} itens</td>
            <td><strong style="color:var(--amarelo)">${money(p.total)}</strong></td>
            <td><select onchange="mudarStatusPedido(${p.id},this.value)" style="background:var(--preto3);border:1px solid var(--borda);color:var(--branco);padding:.3rem .6rem;border-radius:6px;font-size:.78rem">
              ${['Novo','Confirmado','Enviado','Entregue','Cancelado'].map(s=>`<option ${p.status===s?'selected':''}>${s}</option>`).join('')}
            </select></td>
          </tr>
        `).join('')}
      </tbody>
    </table>` : `<div class="empty-state"><div class="ic">🛒</div><h3>Nenhum pedido ainda</h3><p>Os pedidos dos clientes aparecerão aqui.</p></div>`}
  `;
}
function mudarStatusPedido(id,status){ const p=pedidos.find(x=>x.id===id); if(p){ p.status=status; salvarTudo(); toast('Status atualizado'); } }
